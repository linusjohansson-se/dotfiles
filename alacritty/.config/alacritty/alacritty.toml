[general]
import = []

[env]
TERM = "xterm-256color"
COLORTERM = "truecolor"

[window]
padding = { x = 12, y = 10 }
decorations = "full"
opacity = 0.96
blur = true
title = "Alacritty"
dynamic_title = true

[scrolling]
history = 10000
multiplier = 3

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }
size = 13.0
offset = { x = 0, y = 4 }
glyph_offset = { x = 0, y = 2 }

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 600
unfocused_hollow = true

# One Dark theme
[colors.primary]
background = "#282c34"
foreground = "#abb2bf"

[colors.normal]
black   = "#282c34"
red     = "#e06c75"
green   = "#98c379"
yellow  = "#e5c07b"
blue    = "#61afef"
magenta = "#c678dd"
cyan    = "#56b6c2"
white   = "#abb2bf"

[colors.bright]
black   = "#3f4451"
red     = "#ff616e"
green   = "#a5e075"
yellow  = "#e5c07b"
blue    = "#4dc4ff"
magenta = "#de73ff"
cyan    = "#4cd1e0"
white   = "#ffffff"

[colors.selection]
background = "#3e4451"
text       = "CellForeground"

[colors.search.matches]
background = "#3e4451"
foreground = "#abb2bf"

[colors.search.focused_match]
background = "#e5c07b"
foreground = "#282c34"

[bell]
duration = 0

[selection]
save_to_clipboard = true

[keyboard]
bindings = [
  { key = "Return", mods = "Super|Shift", action = "SpawnNewInstance" },
  { key = "Plus",   mods = "Control",     action = "IncreaseFontSize"  },
  { key = "Minus",  mods = "Control",     action = "DecreaseFontSize"  },
  { key = "Key0",   mods = "Control",     action = "ResetFontSize"     },
]
