[general]
import = []

[env]
TERM = "xterm-256color"

[window]
padding = { x = 12, y = 10 }
decorations = "full"
opacity = 0.96
blur = true
title = "Alacritty"
dynamic_title = true

[scrolling]
history = 10000
multiplier = 3

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }
size = 13.0
offset = { x = 0, y = 4 }
glyph_offset = { x = 0, y = 2 }

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 600
unfocused_hollow = true

# Tokyo Night theme
[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"

[colors.normal]
black   = "#15161e"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

[colors.selection]
background = "#283457"
text       = "CellForeground"

[colors.search.matches]
background = "#3d59a1"
foreground = "#c0caf5"

[colors.search.focused_match]
background = "#e0af68"
foreground = "#1a1b26"

[bell]
duration = 0

[selection]
save_to_clipboard = true

[keyboard]
bindings = [
  { key = "Return", mods = "Super|Shift", action = "SpawnNewInstance" },
  { key = "Plus",   mods = "Control",     action = "IncreaseFontSize"  },
  { key = "Minus",  mods = "Control",     action = "DecreaseFontSize"  },
  { key = "Key0",   mods = "Control",     action = "ResetFontSize"     },
]
