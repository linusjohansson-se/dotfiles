[general]
import = []

[env]
TERM = "xterm-256color"
COLORTERM = "truecolor"

[window]
padding = { x = 0, y = 0 }
decorations = "full"
opacity = 0.96
blur = true
title = "Alacritty"
dynamic_title = true

[scrolling]
history = 10000
multiplier = 3

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }
size = 13.0
offset = { x = 0, y = 4 }
glyph_offset = { x = 0, y = 2 }

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 600
unfocused_hollow = true

# Carbonfox theme
[colors.primary]
background = "#161616"
foreground = "#f2f4f8"

[colors.normal]
black   = "#282828"
red     = "#ee5396"
green   = "#25be6a"
yellow  = "#08bdba"
blue    = "#78a9ff"
magenta = "#be95ff"
cyan    = "#33b1ff"
white   = "#dde1e6"

[colors.bright]
black   = "#484848"
red     = "#f16da6"
green   = "#46c880"
yellow  = "#2fc5c2"
blue    = "#8cb6ff"
magenta = "#c8a8ff"
cyan    = "#52bdff"
white   = "#ffffff"

[colors.selection]
background = "#2a2a2a"
text       = "CellForeground"

[colors.search.matches]
background = "#2a2a2a"
foreground = "#f2f4f8"

[colors.search.focused_match]
background = "#78a9ff"
foreground = "#161616"

[bell]
duration = 0

[selection]
save_to_clipboard = true

[keyboard]
bindings = [
  { key = "Return", mods = "Super|Shift", action = "SpawnNewInstance" },
  { key = "Plus",   mods = "Control",     action = "IncreaseFontSize"  },
  { key = "Minus",  mods = "Control",     action = "DecreaseFontSize"  },
  { key = "Key0",   mods = "Control",     action = "ResetFontSize"     },
]
